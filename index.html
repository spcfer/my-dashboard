<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的时间统计分析</title>
    <!-- Chart.js 轻量CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f5f7fb;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            max-width: 1400px;
            width: 100%;
            border-radius: 28px;
            box-shadow: 0 20px 40px -10px rgba(0,20,30,0.15);
            padding: 30px;
        }
        .header {
            margin-bottom: 25px;
            display: flex;
            justify-content: flex-start;  /* 改为左对齐 */
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        /* 移除标题样式，但保留结构 */
        .filters {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
            padding: 6px 12px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
        }
        .filter-group select {
            border: none;
            background: transparent;
            padding: 6px 8px;
            font-size: 0.95rem;
            color: #1e293b;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            border-radius: 20px;
        }
        .filter-group select:hover {
            background: #e9eef3;
        }
        .chart-container {
            position: relative;
            height: 550px;
            border-radius: 20px;
            background: #fdfdfe;
            padding: 15px 10px 5px 10px;
            border: 1px solid #edf2f7;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr 3fr;
            }
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .error-alert {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            border-radius: 40px;
            padding: 14px 25px;
            font-size: 0.95rem;
            display: none;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .error-alert.show {
            display: flex;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
<div class="card">
    <!-- 移除标题，只保留筛选器居左 -->
    <div class="header">
        <div class="filters">
            <div class="filter-group">
                <select id="yearSelect">
                    <!-- 2026~2099 硬编码，无需请求 -->
                </select>
            </div>
            <div class="filter-group">
                <select id="monthSelect">
                    <option value="">全部</option>
                    <option value="01">1月</option>
                    <option value="02">2月</option>
                    <option value="03">3月</option>
                    <option value="04">4月</option>
                    <option value="05">5月</option>
                    <option value="06">6月</option>
                    <option value="07">7月</option>
                    <option value="08">8月</option>
                    <option value="09">9月</option>
                    <option value="10">10月</option>
                    <option value="11">11月</option>
                    <option value="12">12月</option>
                </select>
            </div>
        </div>
    </div>

    <div id="errorBox" class="error-alert">
        <span>⚠️</span> <span id="errorMsg"></span>
    </div>

    <!-- 恢复两个图表的网格布局 -->
    <div class="charts-grid">
        <div class="chart-container">
            <canvas id="categoryPieChart"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="weeklyCategoryChart"></canvas>
        </div>
    </div>
</div>

<script>
    (function() {
        const POCKETBASE_URL = 'http://127.0.0.1:8090';
        const COLLECTION = 'done_things_sum';

        const canvas = document.getElementById('weeklyCategoryChart');
        const pieCanvas = document.getElementById('categoryPieChart');
        const errorBox = document.getElementById('errorBox');
        const errorMsg = document.getElementById('errorMsg');
        const yearSelect = document.getElementById('yearSelect');
        const monthSelect = document.getElementById('monthSelect');

        let barChart = null;
        let pieChart = null;

        // ================= 动态获取当前年月 =================
        const today = new Date();
        const CURRENT_YEAR = today.getFullYear();
        const currentMonthNumber = today.getMonth() + 1;
        const CURRENT_MONTH_PAD = currentMonthNumber.toString().padStart(2, '0');

        // 硬编码年份范围 2026 ~ 2099
        const START_YEAR = 2026;
        const END_YEAR = 2099;

        // 实际显示的默认年份：如果当前年份在2026~2099之间，则使用当前年份，否则用2026
        let DEFAULT_YEAR = (CURRENT_YEAR >= START_YEAR && CURRENT_YEAR <= END_YEAR) 
                            ? CURRENT_YEAR.toString() 
                            : '2026';

        const DEFAULT_MONTH = CURRENT_MONTH_PAD;

        console.log(`动态初始年月: ${DEFAULT_YEAR}年${DEFAULT_MONTH}月`);

        function showError(message) {
            errorMsg.innerText = message || '未知错误';
            errorBox.classList.add('show');
        }
        
        function hideError() {
            errorBox.classList.remove('show');
        }

        function parseJsonField(field) {
            if (field === null || field === undefined) return 0;
            if (typeof field === 'number') return field;
            if (typeof field === 'string') {
                try {
                    const parsed = JSON.parse(field);
                    return typeof parsed === 'number' ? parsed : 0;
                } catch {
                    const num = parseFloat(field);
                    return isNaN(num) ? 0 : num;
                }
            }
            return 0;
        }

        // 填充年份选择器 (2026~2099)
        function populateYearSelect() {
            yearSelect.innerHTML = '';
            for (let y = START_YEAR; y <= END_YEAR; y++) {
                const option = document.createElement('option');
                option.value = y;
                option.textContent = `${y}年`;
                yearSelect.appendChild(option);
            }
            yearSelect.value = DEFAULT_YEAR;
        }

        // 构建filter字符串
        function buildFilter() {
            const selectedYear = yearSelect.value;
            const selectedMonth = monthSelect.value;
            
            if (selectedMonth) {
                return `(year = ${selectedYear} && month = '${selectedMonth}')`;
            } else {
                return `(year = ${selectedYear})`;
            }
        }

        // 柱状图数据整理 (按周和分类)
        function organizeDataByWeek(records) {
            const weekMap = new Map();
            const categorySet = new Set();

            records.forEach(record => {
                const week = record.week;
                const category = record.category_name;
                if (week === undefined || week === null || !category) return;

                const hours = parseJsonField(record.total_hours);
                if (hours === 0) return;

                categorySet.add(category);

                if (!weekMap.has(week)) {
                    weekMap.set(week, new Map());
                }
                
                const categoryMap = weekMap.get(week);
                const currentHours = categoryMap.get(category) || 0;
                categoryMap.set(category, currentHours + hours);
            });

            if (weekMap.size === 0) {
                return { weeks: [], categories: [], dataByCategory: {} };
            }

            const sortedWeeks = Array.from(weekMap.keys()).sort((a, b) => {
                const yearA = parseInt(a.substring(0, 4));
                const yearB = parseInt(b.substring(0, 4));
                const weekA = parseInt(a.substring(5));
                const weekB = parseInt(b.substring(5));
                
                if (yearA !== yearB) return yearB - yearA;
                return weekB - weekA;
            });

            const sortedCategories = Array.from(categorySet).sort((a, b) => a.localeCompare(b));

            const dataByCategory = {};

            sortedCategories.forEach(category => {
                dataByCategory[category] = new Array(sortedWeeks.length).fill(0);
            });

            sortedWeeks.forEach((week, weekIndex) => {
                const categoryMap = weekMap.get(week);
                categoryMap.forEach((hours, category) => {
                    const categoryIndex = sortedCategories.indexOf(category);
                    if (categoryIndex !== -1) {
                        dataByCategory[category][weekIndex] = hours;
                    }
                });
            });

            return {
                weeks: sortedWeeks,
                categories: sortedCategories,
                dataByCategory: dataByCategory
            };
        }

        // 饼图数据整理
        function organizeDataForPie(records) {
            const counts = {};
            records.forEach(record => {
                const category = record.category_name;
                if (!category) return;
                const num = parseJsonField(record.done_count);
                if (num === 0) return;
                counts[category] = (counts[category] || 0) + num;
            });
            const categories = Object.keys(counts).sort((a, b) => a.localeCompare(b));
            const data = categories.map(c => counts[c]);
            return { categories, data };
        }

        // 渲染柱状图
        function renderGroupedBarChart(weeks, categories, dataByCategory) {
            if (barChart) barChart.destroy();

            const datasets = categories.map(category => {
                const hue = Array.from(category).reduce((acc, ch) => acc + ch.charCodeAt(0), 0) % 360;
                return {
                    label: category,
                    data: dataByCategory[category],
                    backgroundColor: `hsl(${hue}, 70%, 65%)`,
                    borderColor: `hsl(${hue}, 70%, 45%)`,
                    borderWidth: 1,
                    borderRadius: 4
                };
            });

            const ctx = canvas.getContext('2d');
            
            // 注册数据显示插件
            Chart.register({
                id: 'barLabels',
                afterDatasetsDraw(chart) {
                    const ctx = chart.ctx;
                    chart.data.datasets.forEach((dataset, datasetIndex) => {
                        const meta = chart.getDatasetMeta(datasetIndex);
                        if (!meta.hidden) {
                            meta.data.forEach((element, index) => {
                                const value = dataset.data[index];
                                if (value > 0) {
                                    const { x, y } = element.tooltipPosition();
                                    ctx.save();
                                    ctx.font = 'bold 11px system-ui';
                                    ctx.fillStyle = '#1e293b';
                                    ctx.shadowColor = 'white';
                                    ctx.shadowBlur = 4;
                                    ctx.shadowOffsetX = 0;
                                    ctx.shadowOffsetY = 0;
                                    ctx.textAlign = 'center';
                                    ctx.textBaseline = 'bottom';
                                    
                                    const displayValue = Number.isInteger(value) ? value.toString() : value.toFixed(1);
                                    ctx.fillText(displayValue, x, y - 4);
                                    
                                    ctx.restore();
                                }
                            });
                        }
                    });
                }
            });

            barChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: weeks,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        },
                        tooltip: false
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { 
                                maxRotation: 45, 
                                minRotation: 30
                            }
                        },
                        y: {
                            beginAtZero: true,
                            title: { display: true, text: '时长 (小时)' }
                        }
                    }
                }
            });
        }

        // 绘制饼图
        function renderPieChart(categories, data) {
            if (pieChart) pieChart.destroy();

            const backgroundColors = categories.map(cat => {
                const hue = Array.from(cat).reduce((acc, ch) => acc + ch.charCodeAt(0), 0) % 360;
                return `hsl(${hue}, 70%, 65%)`;
            });
            const borderColors = categories.map(cat => {
                const hue = Array.from(cat).reduce((acc, ch) => acc + ch.charCodeAt(0), 0) % 360;
                return `hsl(${hue}, 70%, 45%)`;
            });
            
            pieChart = new Chart(pieCanvas.getContext('2d'), {
                type: 'pie',
                data: {
                    labels: categories,
                    datasets: [{
                        data: data,
                        backgroundColor: backgroundColors,
                        borderColor: borderColors,
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { 
                            position: 'bottom',
                            labels: {
                                generateLabels: (chart) => {
                                    const data = chart.data;
                                    if (data.labels && data.labels.length && data.datasets.length) {
                                        const dataset = data.datasets[0];
                                        
                                        return data.labels.map((label, i) => {
                                            return {
                                                text: label,
                                                fillStyle: dataset.backgroundColor[i],
                                                strokeStyle: dataset.borderColor[i],
                                                lineWidth: 1,
                                                hidden: false,
                                                index: i
                                            };
                                        });
                                    }
                                    return [];
                                }
                            }
                        },
                        tooltip: false
                    }
                }
            });

            // 在饼图上绘制百分比
            const total = data.reduce((a, b) => a + b, 0);
            
            const originalDraw = pieChart.draw;
            pieChart.draw = function() {
                originalDraw.call(this);
                
                const ctx = pieCanvas.getContext('2d');
                const meta = this.getDatasetMeta(0);
                
                if (!meta || !meta.data) return;
                
                meta.data.forEach((element, index) => {
                    const value = data[index];
                    if (value > 0 && total > 0) {
                        const percent = Math.round(value / total * 100) + '%';
                        
                        const { x, y } = element.tooltipPosition();
                        
                        const startAngle = element.startAngle;
                        const endAngle = element.endAngle;
                        const midAngle = (startAngle + endAngle) / 2;
                        
                        const radius = element.outerRadius * 0.3;
                        const offsetX = Math.cos(midAngle) * radius;
                        const offsetY = Math.sin(midAngle) * radius;
                        
                        const newX = x + offsetX;
                        const newY = y + offsetY;
                        
                        ctx.save();
                        ctx.font = 'bold 14px system-ui, -apple-system, sans-serif';
                        ctx.fillStyle = '#ffffff';
                        ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
                        ctx.shadowBlur = 6;
                        ctx.shadowOffsetX = 1;
                        ctx.shadowOffsetY = 1;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(percent, newX, newY);
                        ctx.restore();
                    }
                });
            };
            
            pieChart.update();
        }

        // 获取数据并更新两个图表
        async function fetchData() {
            hideError();

            try {
                const filter = buildFilter();
                console.log('Filter:', filter);
                const encodedFilter = encodeURIComponent(filter);
                
                const url = `${POCKETBASE_URL}/api/collections/${COLLECTION}/records?sort=week&perPage=500&filter=${encodedFilter}`;
                
                console.log('Fetching URL:', url);

                const response = await fetch(url, {
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) {
                    let errDetail = `HTTP ${response.status}`;
                    if (response.status === 404) {
                        errDetail += ' 集合不存在';
                    }
                    throw new Error(errDetail);
                }

                const data = await response.json();
                const items = data.items || [];
                
                console.log('Fetched items:', items.length);
                
                if (items.length === 0) {
                    showError('所选条件下暂无数据');
                    if (barChart) barChart.destroy();
                    if (pieChart) pieChart.destroy();
                    barChart = null;
                    pieChart = null;
                    return;
                }

                // 更新柱状图
                const chartData = organizeDataByWeek(items);
                if (chartData.weeks.length > 0) {
                    renderGroupedBarChart(
                        chartData.weeks, 
                        chartData.categories, 
                        chartData.dataByCategory
                    );
                } else {
                    if (barChart) barChart.destroy();
                    barChart = null;
                }

                // 更新饼图
                const pieData = organizeDataForPie(items);
                if (pieData.categories.length > 0) {
                    renderPieChart(pieData.categories, pieData.data);
                } else {
                    if (pieChart) pieChart.destroy();
                    pieChart = null;
                }

            } catch (err) {
                console.error('Fetch error:', err);
                showError(`请求失败: ${err.message}`);
            }
        }

        // 事件绑定
        yearSelect.addEventListener('change', fetchData);
        monthSelect.addEventListener('change', fetchData);

        // 初始化
        function init() {
            populateYearSelect();
            monthSelect.value = DEFAULT_MONTH;
            fetchData();
        }

        init();
    })();
</script>
</body>
</html>
